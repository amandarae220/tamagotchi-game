<div class="setup-page" [ngStyle]="selectedThemeStyle">
  <div class="setup-container">
    <section class="card preview-card">
      <h1 class="visually-hidden">Create your virtual pet</h1>
      <h2>Preview</h2>
      <div class="pet-preview">
        <canvas
          #previewCanvas
          role="img"
          [attr.aria-label]="petType + ' preview'"
        >
          {{ petType }} preview
        </canvas>
      </div>
    </section>

    <section class="card setup-card">
      <h2>Create your pet</h2>

      <div class="form-group">
        <label for="petName">Name</label>
        <input
          #nameInput
          id="petName"
          [(ngModel)]="name"
          name="petName"
          required
          pattern="^[A-Za-z]+$"
          (input)="showNameError = false"
          [class.input-error]="showNameError"
          [attr.aria-invalid]="showNameError"
          [attr.aria-describedby]="showNameError ? 'pet-name-error' : null"
        />
        <div *ngIf="showNameError" id="pet-name-error" class="error-message" aria-live="assertive">
          Please enter a name using letters only.
        </div>
      </div>

      <fieldset class="form-group choice-group">
        <legend>Species</legend>
        <div class="species-buttons" role="radiogroup" aria-label="Pet species">
          <button
            *ngFor="let pet of petOptions"
            type="button"
            role="radio"
            class="species-btn"
            [class.active]="petType === pet.id"
            [attr.aria-checked]="petType === pet.id"
            (click)="selectPet(pet.id)"
          >
            {{ pet.label }}
          </button>
        </div>
      </fieldset>

      <fieldset class="form-group choice-group">
        <legend>Theme</legend>
        <div class="theme-selector" role="radiogroup" aria-label="Theme">
          <button
            *ngFor="let option of themeOptions"
            type="button"
            role="radio"
            class="theme-card"
            [class.active]="theme === option.id"
            [attr.aria-checked]="theme === option.id"
            [attr.aria-label]="option.label + ' theme'"
            (click)="selectTheme(option.id)"
          >
            <div class="theme-preview" [ngStyle]="option.previewStyle" aria-hidden="true"></div>
            <span>{{ option.label }}</span>
          </button>
        </div>

        <button type="button" class="btn btn-primary start-btn" (click)="startGame()">
          Start
        </button>
      </fieldset>
    </section>
  </div>
</div>
