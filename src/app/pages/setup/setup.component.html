<div class="setup-page" [ngStyle]="getThemeStyle(theme)">

    <div class="setup-container">

        <div class="card preview-card">

            <h3>Preview</h3>

            <div class="pet-preview">
                <canvas #previewCanvas></canvas>
            </div>

        </div>

        <div class="card setup-card">

            <h3>Create your pet</h3>

            <div class="form-group">

            <label for="petName">Name</label>

            <input
                #nameInput
                id="petName"
                [(ngModel)]="name"
                name="petName"
                required
                pattern="^[A-Za-z]+$"
                (input)="showNameError=false"
                [class.input-error]="showNameError"
            />

            <div *ngIf="showNameError" class="error-message">
                Please enter a name using letters only.
            </div>

            </div>

            <div class="form-group">
                <label>Species</label>

<div class="species-buttons">

  <button
    class="species-btn"
    [class.active]="petType==='duck'"
    (click)="selectPet('duck')">
    duck
  </button>

  <button
    class="species-btn"
    [class.active]="petType==='dog'"
    (click)="selectPet('dog')">
    dog
  </button>

</div>

            </div>
                    <div class="form-group">
            <label>Theme</label>

<div class="theme-selector">

  <button
    class="theme-card"
    [class.active]="theme === 'tan'"
    (click)="selectTheme('tan')">

    <div class="theme-preview" [ngStyle]="getThemeStyle('tan')"></div>
    <span>tan</span>

  </button>

  <button
    class="theme-card"
    [class.active]="theme === 'mint'"
    (click)="selectTheme('mint')">

    <div class="theme-preview" [ngStyle]="getThemeStyle('mint')"></div>
    <span>mint</span>

  </button>

  <button
    class="theme-card"
    [class.active]="theme === 'lavender'"
    (click)="selectTheme('lavender')">

    <div class="theme-preview" [ngStyle]="getThemeStyle('lavender')"></div>
    <span>lavender</span>

  </button>

  <button
    class="theme-card"
    [class.active]="theme === 'peach'"
    (click)="selectTheme('peach')">

    <div class="theme-preview" [ngStyle]="getThemeStyle('peach')"></div>
    <span>peach</span>

  </button>

  <button
    class="theme-card"
    [class.active]="theme === 'sky'"
    (click)="selectTheme('sky')">

    <div class="theme-preview" [ngStyle]="getThemeStyle('sky')"></div>
    <span>sky</span>

  </button>

</div>

            <button class="btn btn-primary start-btn" (click)="startGame()">
                Start
            </button>

        </div>
        </div>
    </div>
</div>
