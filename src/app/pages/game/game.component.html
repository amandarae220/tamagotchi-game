<div class="game-page" [ngStyle]="getThemeStyle(pet.theme)">
  <div class="game-layout">

    <!-- 🐣 PET -->
    <div class="card pet-card">
      <h3>{{ pet.petName }}</h3>

      <div class="pet-preview">
        <canvas #canvas></canvas>
      </div>
    </div>

    <!-- 📊 STATS -->
    <div class="card stats-card">

      <div class="stats-header">
        <h4>Stats</h4>
        <span class="mood-pill">{{ getMood() }}</span>
      </div>

      <div class="stat">
        <div class="stat-row">
          <label>Fullness</label>
          <span>{{ pet.needs.fullness }}%</span>
        </div>
        <div class="bar">
          <div class="fill yellow" [style.width.%]="pet.needs.fullness"></div>
        </div>
      </div>

      <div class="stat">
        <div class="stat-row">
          <label>Energy</label>
          <span>{{ pet.needs.energy }}%</span>
        </div>
        <div class="bar">
          <div class="fill green" [style.width.%]="pet.needs.energy"></div>
        </div>
      </div>

      <div class="stat">
        <div class="stat-row">
          <label>Joy</label>
          <span>{{ pet.needs.joy }}%</span>
        </div>
        <div class="bar">
          <div class="fill blue" [style.width.%]="pet.needs.joy"></div>
        </div>
      </div>

      <div class="stat">
        <div class="stat-row">
          <label>Clean</label>
          <span>{{ pet.needs.clean }}%</span>
        </div>
        <div class="bar">
          <div class="fill purple" [style.width.%]="pet.needs.clean"></div>
        </div>
      </div>

    </div>

    <!-- 🎮 ACTIONS -->
    <div class="card actions-card">
      <h4>Actions</h4>

      <div class="actions">
        <button class="btn feed" (click)="feed()">Feed</button>
        <button class="btn play" (click)="play()">Play</button>
        <button class="btn nap" (click)="nap()">Nap</button>
        <button class="btn bath" (click)="bathe()">Bath</button>
        <!--button class="btn cuddle" (click)="cuddle()">Cuddle</button-->
      </div>
    </div>

    <!-- ⚙️ MANAGEMENT -->
    <div class="card management-card">
      <h4>Management</h4>

      <div class="management-actions">
        <button (click)="togglePause()">
          {{ isPaused ? 'Resume' : 'Pause' }}
        </button>

        <button (click)="goToSetup()">New</button>

        <button (click)="pet.reset()">Reset</button>
      </div>
    </div>

  </div>
</div>
