<div class="game-page" [ngStyle]="themeStyle">
  <div class="game-layout">
    <section class="card pet-card">
      <h3>{{ pet.petName }}</h3>
      <div class="pet-preview">
        <canvas #canvas></canvas>
      </div>
    </section>

    <section class="card stats-card">
      <div class="stats-header">
        <h4>Stats</h4>
        <span class="mood-pill">{{ pet.mood }}</span>
      </div>

      <div *ngFor="let stat of stats; trackBy: trackStat" class="stat">
        <div class="stat-row">
          <label>{{ stat.label }}</label>
          <span>{{ pet.needs[stat.key] }}%</span>
        </div>
        <div class="bar">
          <div [ngClass]="['fill', stat.tone]" [style.width.%]="pet.needs[stat.key]"></div>
        </div>
      </div>
    </section>

    <section class="card actions-card">
      <h4>Actions</h4>
      <div class="actions">
        <button type="button" class="btn feed" (click)="performAction('FEED')">Feed</button>
        <button type="button" class="btn play" (click)="performAction('PLAY')">Play</button>
        <button type="button" class="btn nap" (click)="performAction('SLEEP')">Nap</button>
        <button type="button" class="btn bath" (click)="performAction('BATHE')">Bath</button>
      </div>
    </section>

    <section class="card management-card">
      <h4>Management</h4>
      <div class="management-actions">
        <button type="button" (click)="togglePause()">
          {{ isPaused ? 'Resume' : 'Pause' }}
        </button>
        <button type="button" (click)="goToSetup()">New</button>
        <button type="button" (click)="resetPet()">Reset</button>
      </div>
    </section>
  </div>
</div>
